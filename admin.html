<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選務後台管理系統</title>
    <style>
        body { font-family: '微軟正黑體', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #333; color: #fff; }
        .card { background: #444; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 15px 0; box-sizing: border-box; border-radius: 5px; border: none; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .code-box { background: #fff; color: #000; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 18px; letter-spacing: 2px; }
        hr { border-color: #666; }
    </style>
</head>
<body>

    <h1>⚙️ 選務後台管理</h1>

    <!-- 區塊 1：產生密碼 -->
    <div class="card">
        <h2>1. 產生投票密碼</h2>
        <p>點擊按鈕將隨機產生 40 組未使用的密碼，請複製並列印出來發放。</p>
        <button id="generate-codes-btn">產生 40 組新密碼</button>
        <div id="codes-display" class="code-box" style="display: none; margin-top: 15px;"></div>
    </div>

    <!-- 區塊 2：設定職位與候選人 -->
    <div class="card">
        <h2>2. 新增選舉職位</h2>
        <label>職位名稱 (例如：小組長)</label>
        <input type="text" id="role-title" placeholder="輸入職位名稱">
        
        <label>應選人數</label>
        <input type="number" id="role-max" placeholder="輸入數字，例如: 4" min="1">

        <label>顯示順序 (數字越小排越上面，例如 1)</label>
        <input type="number" id="role-order" value="1">
        
        <label>候選人名單 (請用「半角逗號 ,」隔開每個人)</label>
        <textarea id="role-candidates" rows="3" placeholder="例如: 張三,李四,王五"></textarea>
        
        <button id="add-role-btn" style="background: #28a745;">新增此職位</button>
    </div>

    <!-- 區塊 3：目前的職位列表 -->
    <div class="card">
        <h2>目前的選票設定</h2>
        <div id="current-roles-list">讀取中...</div>
    </div>

    <!-- 區塊 4：開票結果 -->
    <div class="card">
        <h2>3. 開票結果</h2>
        <button id="tally-btn" style="background: #dc3545;">進行開票</button>
        <button id="export-btn" style="background: #28a745; margin-left: 10px; display: none;">匯出 Excel 詳細紀錄</button>
        <div id="tally-result" style="margin-top: 15px; background: #fff; color: #000; padding: 15px; border-radius: 5px; display: none;"></div>
    </div>

    <!-- 區塊 5：交接與重置 -->
    <div class="card" style="border: 2px solid #dc3545;">
        <h2 style="color: #dc3545;">⚠️ 換屆交接：重置系統</h2>
        <p>當本屆選舉完全結束，並已經匯出備份後，可以點擊下方按鈕清空「所有的密碼」與「所有的選票紀錄」，將一個乾淨的系統交接給下一屆。</p>
        <p style="color: #ffcccc; font-size: 14px;">(註：選舉職位設定不會被刪除)</p>
        <button id="reset-system-btn" style="background: transparent; border: 2px solid #dc3545; color: #dc3545;">一鍵清空選票與密碼庫</button>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
